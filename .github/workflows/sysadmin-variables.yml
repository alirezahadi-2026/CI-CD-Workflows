  name: Aufgaben CI-CD Workflows

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: MyDemoApp
  TARGET_ENV: production
  REGION: eu-central-1

jobs:
  test:
    runs-on: ubuntu-latest

  
    env:
      TARGET_ENV: staging

    steps:
      - name: Repository holen
        uses: actions/checkout@v4

      - name: System info
        run: uname -a

      - name: Show basic runtime info
        run: |
          echo "=== LOG START ==="
          echo "Application: $APP_NAME"
          echo "Target environment: $TARGET_ENV"
          echo "Region: $REGION"
          echo "Running on: $(uname -a)"
          echo "=== LOG END ==="

      
      - name: Step-specific variable usage
        env:
          REGION: us-east-1
        run: |
          mkdir -p reports
          echo "Runtime Info" > reports/runtime-info.txt

          echo "APP_NAME: $APP_NAME" >> reports/runtime-info.txt
          echo "TARGET_ENV: $TARGET_ENV" >> reports/runtime-info.txt
          echo "REGION (step override): $REGION" >> reports/runtime-info.txt

          echo "Simulated system: $TARGET_ENV" >> reports/runtime-info.txt
          echo "Working region: $REGION" >> reports/runtime-info.txt
          echo "Application: $APP_NAME" >> reports/runtime-info.txt

      - name: Show runtime file
        run: cat reports/runtime-info.txt