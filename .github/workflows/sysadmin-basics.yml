name: Secrets Demo Workflow

on:
  push:
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check secrets existence
        env:
          CLOUD_API_TOKEN: ${{ secrets.CLOUD_API_TOKEN }}
          SSH_TARGET: ${{ secrets.SSH_TARGET }}
        run: |
          echo "=== Secret Check ==="

          if [ -z "$CLOUD_API_TOKEN" ]; then
            echo "CLOUD_API_TOKEN: FEHLT ❌"
          else
            echo "CLOUD_API_TOKEN: VORHANDEN ✅"
          fi

          if [ -z "$SSH_TARGET" ]; then
            echo "SSH_TARGET: FEHLT ❌"
          else
            echo "SSH_TARGET: VORHANDEN ✅"
          fi

      - name: Use secrets safely
        env:
          CLOUD_API_TOKEN: ${{ secrets.CLOUD_API_TOKEN }}
          SSH_TARGET: ${{ secrets.SSH_TARGET }}
        run: |
          echo "=== Safe usage ==="

          # فقط بررسی وجود، نه مقدار
          if [ -n "$CLOUD_API_TOKEN" ]; then
            echo "Token status: OK (nicht angezeigt)"
          else
            echo "Token status: FEHLT"
          fi

          if [ -n "$SSH_TARGET" ]; then
            echo "SSH target status: OK (nicht angezeigt)"
          else
            echo "SSH target status: FEHLT"
          fi