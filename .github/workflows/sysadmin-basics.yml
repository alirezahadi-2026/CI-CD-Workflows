name: Aufgaben CI-CD Workflows

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: MyDemoApp
  TARGET_ENV: production
  REGION: eu-central-1

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      TARGET_ENV: staging

    steps:
      - name: Repository holen
        uses: actions/checkout@v4

      - name: System info
        run: uname -a

      - name: Create system report
        run: |
          mkdir -p reports
          echo "System Report" > reports/system-report.txt
          echo "Date: $(date)" >> reports/system-report.txt
          echo "Runner: ${{ runner.name }}" >> reports/system-report.txt
          echo "Directory: $(pwd)" >> reports/system-report.txt
          ls -la >> reports/system-report.txt

      - name: Create runtime info
        run: |
          mkdir -p reports
          echo "Runtime Info" > reports/runtime-info.txt
          echo "APP_NAME: $APP_NAME" >> reports/runtime-info.txt
          echo "TARGET_ENV: $TARGET_ENV" >> reports/runtime-info.txt
          echo "REGION: $REGION" >> reports/runtime-info.txt
          echo "Simulated system: $TARGET_ENV" >> reports/runtime-info.txt


      - name: Upload reports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: workflow-reports
          path: |
            reports/system-report.txt
            reports/runtime-info.txt